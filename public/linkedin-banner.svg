<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0322"/>
      <stop offset="35%" stop-color="#2d0a57"/>
      <stop offset="75%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="lglow1" cx="0.9" cy="0.1" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.45"/>
      <stop offset="65%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lglow2" cx="0.05" cy="0.95" r="0.4">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="lLogoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="dotgrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1584" height="396" fill="url(#lbg)"/>
  <rect width="1584" height="396" fill="url(#dotgrid)"/>
  <rect width="1584" height="396" fill="url(#lglow1)"/>
  <rect width="1584" height="396" fill="url(#lglow2)"/>

  <!-- Subtle vertical line separator (mid) -->
  <line x1="1000" y1="80" x2="1000" y2="316" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- LEFT — Identity + positioning -->
  <g transform="translate(380, 0)">

    <!-- Logo A small + ANMA Hub wordmark -->
    <g transform="translate(0, 90)">
      <rect width="56" height="56" rx="14" fill="url(#lLogoGrad)"/>
      <text x="28" y="42" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="36" font-weight="600" fill="#ffffff">A</text>
      <circle cx="43" cy="14" r="5" fill="#34d399"/>
    </g>
    <text x="72" y="128" font-family="Poppins, Inter, sans-serif" font-size="20" font-weight="600" fill="#ffffff" letter-spacing="0.5">ANMA Hub</text>
    <text x="72" y="150" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#cbd5e1" letter-spacing="0.3">anmahub.com</text>

    <!-- Main statement -->
    <text x="0" y="220" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" fill="#ffffff" letter-spacing="-1">Construyo software</text>
    <text x="0" y="268" font-family="Fraunces, Georgia, serif" font-size="44" font-weight="600" letter-spacing="-1">
      <tspan fill="url(#lAccent)">para negocios reales.</tspan>
    </text>

    <!-- Subline -->
    <text x="0" y="312" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#cbd5e1">SaaS · Producto · Operaciones · AI-Assisted Development</text>
  </g>

  <!-- RIGHT — Mini "what I build" panel -->
  <g transform="translate(1060, 90)">
    <!-- Container -->
    <rect width="380" height="216" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

    <!-- Header -->
    <text x="22" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1.5">EN PRODUCCIÓN</text>

    <!-- Product card -->
    <g transform="translate(22, 56)">
      <!-- mini logo -->
      <rect width="38" height="38" rx="10" fill="url(#lLogoGrad)"/>
      <text x="19" y="28" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="24" font-weight="600" fill="#ffffff">A</text>
      <circle cx="29" cy="10" r="3.5" fill="#34d399"/>

      <text x="54" y="20" font-family="Poppins, Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff">ANMA Hub</text>
      <text x="54" y="38" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8">SaaS de gestión para pymes</text>
    </g>

    <!-- Mini metric bars -->
    <g transform="translate(22, 116)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#cbd5e1" letter-spacing="0.5">VENTAS DEL MES</text>
      <rect x="0" y="10" width="336" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="0" y="10" width="252" height="6" rx="3" fill="#a855f7"/>
      <text x="0" y="34" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">$1.343.155 <tspan fill="#34d399" font-weight="500" font-size="11">↑ 18%</tspan></text>
    </g>

    <g transform="translate(22, 168)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#cbd5e1" letter-spacing="0.5">COBRADO</text>
      <rect x="0" y="10" width="336" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="0" y="10" width="295" height="6" rx="3" fill="#10b981"/>
      <text x="0" y="34" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff">$1.625.217 <tspan fill="#34d399" font-weight="500" font-size="11">↑ 26%</tspan></text>
    </g>
  </g>

  <!-- Bottom-left strip (where photo overlays) - clean space -->
  <!-- LinkedIn places avatar around x=110, y=320 with 150px diameter, so the left 380px is empty intentionally -->

</svg>
