<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0636"/>
      <stop offset="40%" stop-color="#2d0a57"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.95" r="0.4">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- LEFT SIDE: Brand + original copy -->
  <!-- Logo A + ANMA Hub wordmark -->
  <g transform="translate(70, 70)">
    <rect width="76" height="76" rx="18" fill="url(#logoGrad)"/>
    <text x="38" y="55" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="48" font-weight="600" fill="#ffffff">A</text>
    <circle cx="58" cy="20" r="6" fill="#34d399"/>
  </g>
  <text x="170" y="125" font-family="Poppins, Inter, sans-serif" font-size="38" font-weight="600" fill="#ffffff" letter-spacing="0.5">ANMA Hub</text>

  <!-- Headline (texto original) -->
  <text x="70" y="250" font-family="Fraunces, Georgia, serif" font-size="58" font-weight="600" fill="#ffffff" letter-spacing="-1.4">El centro de control</text>
  <text x="70" y="318" font-family="Fraunces, Georgia, serif" font-size="58" font-weight="600" letter-spacing="-1.4" fill="#ffffff">para tu negocio</text>

  <!-- Subline (texto original) -->
  <text x="70" y="378" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#cbd5e1">Clientes · Pedidos · Stock · Cobros</text>
  <text x="70" y="408" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#cbd5e1">todo en una sola pantalla</text>

  <!-- CTA pill -->
  <g transform="translate(70, 470)">
    <rect width="240" height="56" rx="28" fill="#10b981"/>
    <text x="120" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Probá 7 días gratis</text>
  </g>

  <!-- RIGHT SIDE: Dashboard mockup -->
  <g transform="translate(680, 80)">
    <!-- Container card -->
    <rect width="460" height="470" rx="20" fill="url(#cardBg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Topbar -->
    <rect x="0" y="0" width="460" height="48" rx="20" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="0" y="28" width="460" height="20" fill="#ffffff" fill-opacity="0.05"/>
    <circle cx="22" cy="24" r="5" fill="#ef4444" fill-opacity="0.7"/>
    <circle cx="40" cy="24" r="5" fill="#f59e0b" fill-opacity="0.7"/>
    <circle cx="58" cy="24" r="5" fill="#10b981" fill-opacity="0.7"/>
    <text x="240" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Dashboard · Junio 2026</text>

    <!-- KPI Cards row -->
    <g transform="translate(24, 72)">
      <!-- KPI 1 -->
      <rect width="190" height="92" rx="12" fill="#ffffff" fill-opacity="0.08"/>
      <text x="16" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" letter-spacing="0.5">VENTAS BRUTAS</text>
      <text x="16" y="62" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#ffffff">$1.343.155</text>
      <text x="16" y="82" font-family="Inter, sans-serif" font-size="11" fill="#34d399">↑ 18% vs mes anterior</text>

      <!-- KPI 2 -->
      <g transform="translate(206, 0)">
        <rect width="190" height="92" rx="12" fill="#ffffff" fill-opacity="0.08"/>
        <rect width="190" height="92" rx="12" fill="#10b981" fill-opacity="0.18"/>
        <text x="16" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#6ee7b7" letter-spacing="0.5">INGRESOS CAJA</text>
        <text x="16" y="62" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#ffffff">$1.625.217</text>
        <text x="16" y="82" font-family="Inter, sans-serif" font-size="11" fill="#34d399">↑ 26% este mes</text>
      </g>
    </g>

    <!-- KPI second row -->
    <g transform="translate(24, 176)">
      <rect width="190" height="76" rx="12" fill="#ffffff" fill-opacity="0.08"/>
      <text x="16" y="26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" letter-spacing="0.5">TICKET PROMEDIO</text>
      <text x="16" y="58" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$671.578</text>

      <g transform="translate(206, 0)">
        <rect width="190" height="76" rx="12" fill="#ffffff" fill-opacity="0.08"/>
        <text x="16" y="26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" letter-spacing="0.5">PRESUPUESTOS</text>
        <text x="16" y="58" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">12 abiertos</text>
      </g>
    </g>

    <!-- Mini chart -->
    <g transform="translate(24, 268)">
      <rect width="412" height="178" rx="12" fill="#ffffff" fill-opacity="0.06"/>
      <text x="20" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Ingresos cobrados — día a día</text>

      <!-- Bars -->
      <g transform="translate(28, 52)">
        <rect x="0" y="78" width="22" height="48" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="34" y="58" width="22" height="68" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="68" y="34" width="22" height="92" rx="4" fill="#f59e0b" fill-opacity="0.95"/>
        <rect x="102" y="68" width="22" height="58" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="136" y="20" width="22" height="106" rx="4" fill="#10b981"/>
        <rect x="170" y="40" width="22" height="86" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="204" y="62" width="22" height="64" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="238" y="28" width="22" height="98" rx="4" fill="#f59e0b" fill-opacity="0.9"/>
        <rect x="272" y="48" width="22" height="78" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
        <rect x="306" y="14" width="22" height="112" rx="4" fill="#10b981"/>
        <rect x="340" y="38" width="22" height="88" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
      </g>

      <!-- X axis labels -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#94a3b8">
        <text x="34" y="166">5</text>
        <text x="102" y="166">10</text>
        <text x="170" y="166">15</text>
        <text x="238" y="166">20</text>
        <text x="306" y="166">25</text>
        <text x="374" y="166">30</text>
      </g>
    </g>
  </g>

</svg>
