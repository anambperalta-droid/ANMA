<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200">
  <defs>
    <linearGradient id="aFront" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="aSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="aBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="hubAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="aShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Monograma A centrado -->
  <g transform="translate(120, 5)" filter="url(#aShadow)">
    <path d="M 55 18 L 65 18 L 42 102 L 22 102 Z" fill="url(#aFront)"/>
    <path d="M 60 18 L 65 18 L 47 102 L 40 102 Z" fill="url(#aSide)" opacity="0.55"/>
    <path d="M 55 18 L 65 18 L 98 102 L 78 102 Z" fill="url(#aFront)"/>
    <path d="M 55 18 L 60 18 L 80 102 L 73 102 Z" fill="url(#aSide)" opacity="0.55"/>
    <path d="M 34 68 Q 60 62 86 68 L 86 78 Q 60 84 34 78 Z" fill="url(#aBar)"/>
    <path d="M 36 78 Q 60 82 84 78" stroke="#3B0764" stroke-width="0.6" opacity="0.35" fill="none"/>
  </g>

  <!-- Wordmark "anmaHub" -->
  <text x="180" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif"
        font-weight="800"
        font-size="42"
        text-anchor="middle"
        letter-spacing="-1.6"
        fill="#1E1B4B">anma<tspan fill="url(#hubAccent)">Hub</tspan></text>
</svg>
