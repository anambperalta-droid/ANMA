<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Violeta eléctrico: profundo → luminoso con toque magenta en el borde -->
    <linearGradient id="v" x1="14" y1="54" x2="50" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset=".55" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#E879F9"/>
    </linearGradient>
  </defs>
  <!-- Contenedor limpio: blanco impecable, sin texturas -->
  <rect width="64" height="64" rx="15" fill="#ffffff"/>
  <!-- "A" abierta de trazo continuo: dos piernas con ápice redondeado -->
  <path d="M17 51 32 13.5 47 51" fill="none" stroke="url(#v)" stroke-width="5.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- El bucle central entrelazado: la conexión (hub) reemplaza a la barra -->
  <circle cx="32" cy="37.5" r="8.4" fill="none" stroke="url(#v)" stroke-width="5.6"/>
</svg>
